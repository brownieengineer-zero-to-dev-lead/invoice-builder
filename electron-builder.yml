appId: com.invoice-builder
productName: Invoice Builder

directories:
  output: release

publish:
  provider: github
  owner: brownieengineer-zero-to-dev-lead
  repo: invoice-builder

files:
  - dist-fe/**
  - dist-be/**
  - node_modules/**
  - package.json

# Native modules must live outside the asar so the OS can load them as shared libraries.
# OnlyLoadAppFromAsar fuse still applies — these paths are in app.asar.unpacked, not raw.
asarUnpack:
  - node_modules/keytar/**
  - node_modules/winreg/**

extraMetadata:
  main: dist-be/backend/main/main.cjs

forceCodeSigning: false

afterPack: scripts/after-pack.cjs

win:
  target:
    - nsis

nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false

linux:
  target:
    - deb
  category: Office
  maintainer: 'Piratuks <evaldiz@gmail.com>'
  icon: 'src/backend/main/assets/linux-icons'

mac:
  target:
    - dmg
  category: public.app-category.productivity
  icon: 'src/backend/main/assets/icon.icns'

dmg:
  contents:
    - type: file
      x: 130
      y: 220
    - type: link
      x: 410
      y: 220
      path: /Applications
